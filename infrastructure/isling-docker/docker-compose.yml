volumes:
  auth-postgres-vol-data:
  api-pg-data:
  api-redis-data:
  api-vol-emqx01-data:
  api-vol-emqx01-log:
  # monitor-grafana:
  # monitor-prometheus:
  gorse-redis-data:
  gorse-pg-data:
  gorse-master-data:
  gorse-worker-1-data:
