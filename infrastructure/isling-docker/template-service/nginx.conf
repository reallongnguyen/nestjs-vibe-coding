server {
    listen 80;
    server_name _;
    
    root /usr/share/nginx/html/templates;
    index index.html;
    
    # Security headers
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header X-XSS-Protection "1; mode=block";
    
    # CORS headers for cross-origin template requests
    add_header Access-Control-Allow-Origin *;
    add_header Access-Control-Allow-Methods "GET, OPTIONS";
    add_header Access-Control-Allow-Headers "Content-Type";
    
    # Cache control for templates
    add_header Cache-Control "public, max-age=3600";
    
    # Main location for serving email templates
    location ~ ^/([^/]+\.html)$ {
        try_files /$1 =404;
        add_header Content-Type "text/html; charset=utf-8";
    }
    
    # Health check endpoint
    location /health {
        access_log off;
        return 200 '{"status":"healthy","service":"email-template-service"}';
        add_header Content-Type application/json;
    }
    
    # List available templates endpoint
    location /list {
        access_log off;
        return 200 '["userActivationInvite.html","userPasswordReset.html","userMagicLink.html"]';
        add_header Content-Type application/json;
    }
    
    # Handle preflight OPTIONS requests
    location / {
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods "GET, OPTIONS";
            add_header Access-Control-Allow-Headers "Content-Type";
            add_header Access-Control-Max-Age 1728000;
            add_header Content-Type text/plain;
            add_header Content-Length 0;
            return 204;
        }
        
        try_files $uri $uri/ =404;
    }
    
    # Error pages
    error_page 404 /404.html;
    location = /404.html {
        internal;
        return 404 '{"error":"Template not found"}';
        add_header Content-Type application/json;
    }
} 